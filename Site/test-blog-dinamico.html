<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Test Blog Dinamico</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #F5F3EE; }
    .log { background: #0D1F2D; color: #C9A84C; padding: 20px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; margin-bottom: 20px; min-height: 200px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 20px; }
    .card h3 { margin: 0 0 8px; font-size: 16px; }
    .card p { margin: 0; font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <h1>Test: Blog Dinamico</h1>
  <div class="log" id="log"></div>
  <div class="grid" id="test-grid">
    <div class="card" style="background:#0D1F2D;color:#C9A84C;">
      <h3>Tarjeta fijada (HTML)</h3>
      <p>Esta siempre se ve.</p>
    </div>
  </div>

<script>
  var log = document.getElementById('log');
  function L(msg) {
    log.textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
  }

  L('1. Script iniciado');

  var grid = document.getElementById('test-grid');
  L('2. Grid encontrado: ' + (grid ? 'SI' : 'NO'));

  var fallback = [
    { title: 'Articulo de prueba 1', desc: 'Si ves esto, appendChild funciona.' },
    { title: 'Articulo de prueba 2', desc: 'Si ves esto, el grid acepta hijos dinamicos.' }
  ];

  function addCards(data) {
    L('5. addCards ejecutado con ' + data.length + ' articulos');
    for (var i = 0; i < data.length; i++) {
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + data[i].title + '</h3><p>' + data[i].desc + '</p>';
      grid.appendChild(card);
      L('6. Tarjeta ' + (i+1) + ' agregada al grid');
    }
    L('7. Grid ahora tiene ' + grid.children.length + ' hijos');
  }

  L('3. Intentando fetch /articles.json...');
  fetch('/articles.json')
    .then(function(r) {
      L('4a. Fetch respondio con status ' + r.status + ' (ok=' + r.ok + ')');
      if (!r.ok) throw new Error('Status ' + r.status);
      return r.json();
    })
    .then(function(data) {
      L('4b. JSON parseado OK, ' + data.length + ' articulos');
      addCards(data.slice(0, 2).map(function(a) {
        return { title: a.title, desc: a.desc || 'Sin descripcion' };
      }));
    })
    .catch(function(err) {
      L('4c. Fetch fallo: ' + err.message);
      L('4d. Usando fallback...');
      addCards(fallback);
    });
</script>
</body>
</html>
